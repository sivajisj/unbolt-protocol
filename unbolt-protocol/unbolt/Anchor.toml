[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false
seeds = true


[programs.localnet]
unbolt = "BwkEjgnMoZe6xf99NyLYgqRn6AtPifG962BPgjybD3R2"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

[test]
startup_wait = 3000
validator.args = ["--reset", "--quiet"]